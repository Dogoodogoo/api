<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>도구도구 : 통합 공간 데이터 시각화</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=nxnux3f3r1&submodules=geocoder"></script>
    <!-- 클러스터러 라이브러리는 지도 SDK 로드 후에 배치 -->
    <script type="text/javascript" src="https://navermaps.github.io/maps.js.ncp/docs/js/marker-clusterer.js"></script>

    <style>
        #map { width: 100%; height: calc(100vh - 80px); background-color: #f1f5f9; }
        .info-window { padding: 18px; min-width: 280px; font-size: 13px; line-height: 1.6; }
        .marker-anim { transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; }
        .marker-anim:hover { transform: scale(1.4) translateY(-5px); z-index: 1000; }
        .filter-btn.active { background-color: #0f172a; color: white; border-color: #0f172a; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .cluster-marker { width: 48px; height: 48px; line-height: 48px; text-align: center; border-radius: 50%; border: 3px solid white; color: white; font-weight: 900; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; }
        #progress-container { position: fixed; top: 80px; left: 0; width: 100%; height: 3px; background: transparent; z-index: 100; }
        #progress-bar { width: 0%; height: 100%; background: #4f46e5; transition: width 0.3s; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen flex flex-col overflow-hidden font-sans">

<nav class="bg-white border-b border-slate-200 p-4 shadow-sm z-10 flex-none h-[80px]">
    <div class="max-w-screen-2xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-4">
            <div class="p-2.5 bg-indigo-600 rounded-2xl text-white shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                </svg>
            </div>
            <div>
                <h1 class="text-xl font-black text-slate-800 tracking-tight">도구도구 통합 맵</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Final Stable v11.0</p>
            </div>
        </div>

        <div class="flex bg-slate-100 p-1.5 rounded-2xl border border-slate-200 gap-1">
            <button onclick="switchCategory('pet_places')" id="btn-pet_places" class="filter-btn active px-5 py-2 rounded-xl text-xs font-bold transition-all">🐾 반려견 장소</button>
            <button onclick="switchCategory('drinking_fountains')" id="btn-drinking_fountains" class="filter-btn px-5 py-2 rounded-xl text-xs font-bold text-slate-500 hover:bg-white transition-all">💧 음수대</button>
            <button onclick="switchCategory('trash_bins')" id="btn-trash_bins" class="filter-btn px-5 py-2 rounded-xl text-xs font-bold text-slate-500 hover:bg-white transition-all">🗑️ 쓰레기통</button>
        </div>

        <div class="flex items-center gap-4">
            <div id="loading-status" class="hidden flex items-center gap-2 text-[11px] text-indigo-600 font-bold">
                <div class="w-3 h-3 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                동기화 중...
            </div>
            <div class="px-4 py-2 bg-slate-900 text-white rounded-2xl font-bold text-xs">현재 시야: <span id="marker-count">0</span>건</div>
        </div>
    </div>
</nav>

<div id="progress-container"><div id="progress-bar"></div></div>
<main class="flex-1 relative overflow-hidden bg-slate-100"><div id="map"></div></main>

<script>
    let map, markers = [], clusterer = null, currentCategory = 'pet_places', sharedInfoWindow = null;
    let isAutoFitting = false, loadTimeout = null;

    const API_BASE_PATH = '/api/v1';
    const CHUNK_SIZE = 150;

    const categoryConfig = {
        pet_places: { label: '반려견 장소', endpoint: '/pet-places', color: 'bg-indigo-600', clusterColor: '#4f46e5', icon: '🐾', fetchSize: 500 },
        drinking_fountains: { label: '음수대', endpoint: '/fountains', color: 'bg-sky-500', clusterColor: '#0ea5e9', icon: '💧', fetchSize: 500 },
        trash_bins: { label: '쓰레기통', endpoint: '/trash-bins', color: 'bg-emerald-600', clusterColor: '#059669', icon: '🗑️', fetchSize: 500 }
    };

    function switchCategory(category) {
        if (currentCategory === category) return;
        currentCategory = category;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
            btn.classList.add('text-slate-500');
        });
        const activeBtn = document.getElementById(`btn-${category}`);
        activeBtn.classList.add('active');
        activeBtn.classList.remove('text-slate-500');
        loadCurrentCategoryData(true);
    }

    async function loadCurrentCategoryData(shouldFitBounds = false) {
        if (!map) return;
        const loader = document.getElementById('loading-status'), progressBar = document.getElementById('progress-bar');
        const bounds = map.getBounds(), sw = bounds.getSW(), ne = bounds.getNE(), center = map.getCenter();
        const conf = categoryConfig[currentCategory];

        if (sw.lat() === ne.lat()) return;

        loader.classList.remove('hidden');
        progressBar.style.width = '0%';

        const params = new URLSearchParams({
            minLat: sw.lat(), maxLat: ne.lat(),
            minLng: sw.lng(), maxLng: ne.lng(),
            size: conf.fetchSize
        });

        if (currentCategory === 'trash_bins') {
            params.append('centerLat', center.lat());
            params.append('centerLng', center.lng());
        }

        // URL 생성 로직: 슬래시 중복 방지 및 절대 경로 보장
        const base = (window.location.origin === 'null' || !window.location.origin || window.location.origin.includes('usercontent'))
            ? 'http://localhost:8080'
            : window.location.origin;

        const url = base + API_BASE_PATH + conf.endpoint + '?' + params.toString();

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();

            // [중요 수정] 백엔드가 Map.of("items", ...)를 주든, 바로 List를 주든 모두 대응합니다.
            const items = Array.isArray(data) ? data : (data.items || []);

            document.getElementById('marker-count').innerText = items.length;
            processMarkersInChunks(items, currentCategory, shouldFitBounds);
        } catch (e) {
            console.error("데이터 로드 실패:", e, "URL:", url);
            loaderFinish();
        }
    }

    function processMarkersInChunks(items, category, shouldFitBounds) {
        if (clusterer) { clusterer.clearMarkers(); clusterer.setMap(null); clusterer = null; }
        markers.forEach(m => m.setMap(null)); markers = [];
        if (sharedInfoWindow) sharedInfoWindow.close();

        const conf = categoryConfig[category];
        const total = items.length;
        let index = 0;
        const tempBounds = new naver.maps.LatLngBounds();

        if (total === 0) { loaderFinish(); return; }

        function renderChunk() {
            const end = Math.min(index + CHUNK_SIZE, total);
            for (; index < end; index++) {
                const item = items[index];
                if (!item.latitude || !item.longitude) continue;

                const latlng = new naver.maps.LatLng(item.latitude, item.longitude);
                if (shouldFitBounds) tempBounds.extend(latlng);

                const marker = new naver.maps.Marker({
                    position: latlng,
                    icon: {
                        content: `<div class="marker-anim w-6 h-6 ${conf.color} border-2 border-white rounded-full shadow-lg flex items-center justify-center text-[10px] text-white font-bold">${conf.icon}</div>`,
                        anchor: new naver.maps.Point(12, 12)
                    }
                });

                naver.maps.Event.addListener(marker, "click", () => {
                    sharedInfoWindow.setContent(generateHtml(item, category, conf));
                    sharedInfoWindow.open(map, marker);
                });
                markers.push(marker);
            }
            document.getElementById('progress-bar').style.width = `${(index / total) * 100}%`;
            if (index < total) setTimeout(renderChunk, 10);
            else {
                initClustering(conf);
                if (shouldFitBounds && !tempBounds.isEmpty()) {
                    isAutoFitting = true;
                    map.fitBounds(tempBounds);
                    setTimeout(() => { isAutoFitting = false; }, 500);
                }
            }
        }
        renderChunk();
    }

    function loaderFinish() {
        document.getElementById('loading-status').classList.add('hidden');
        document.getElementById('progress-bar').style.width = '0%';
    }

    function generateHtml(item, category, conf) {
        let title = category === 'pet_places' ? item.placeName : (category === 'drinking_fountains' ? item.fountainName : (item.cityName || '') + ' ' + (item.locationDesc || '가로휴지통'));
        return `
            <div class="info-window bg-white shadow-2xl rounded-3xl p-6 border border-slate-50">
                <div class="flex items-center gap-2 mb-2"><span class="text-[9px] font-black ${conf.color} text-white px-2 py-0.5 rounded-lg uppercase tracking-tighter">${conf.label}</span></div>
                <h4 class="font-black text-slate-900 text-base mb-3 leading-tight">${title || '정보 없음'}</h4>
                <div class="space-y-2 text-[11px] text-slate-500 border-t border-slate-50 pt-3">
                    <p class="flex items-start gap-2"><span class="font-black text-slate-800 min-w-[55px]">주소</span> <span>${item.address || '-'}</span></p>
                    ${category === 'pet_places' ? `<p class="flex items-start gap-2"><span class="font-black text-slate-800 min-w-[55px]">동반정보</span> <span class="text-indigo-600 font-bold">${item.petInfo || '확인 필요'}</span></p>` : ''}
                    ${category === 'drinking_fountains' ? `<p class="flex items-start gap-2"><span class="font-black text-slate-800 min-w-[55px]">관리주체</span> <span>${item.managedBy || '-'}</span></p>` : ''}
                    ${category === 'trash_bins' ? `<p class="flex items-start gap-2"><span class="font-black text-slate-800 min-w-[55px]">수거유형</span> <span class="text-emerald-600 font-bold">${item.binType || '일반'}</span></p>` : ''}
                </div>
            </div>`;
    }

    function initClustering(conf) {
        if (typeof MarkerClustering !== 'undefined' && markers.length > 0) {
            clusterer = new MarkerClustering({
                minClusterSize: 2, maxZoom: 15, map: map, markers: markers,
                gridSize: 120, icons: Array(5).fill({ content: `<div class="cluster-marker" style="background:${conf.clusterColor}"></div>` }),
                indexGenerator: [10, 50, 100, 250, 500],
                stylingFunction: (m, c) => { if (m.getElement()) m.getElement().querySelector('.cluster-marker').innerText = c; }
            });
        } else { markers.forEach(m => m.setMap(map)); }
        loaderFinish();
    }

    window.onload = function() {
        if (typeof naver === 'undefined') {
            console.error("Naver Maps SDK 로드 실패.");
            return;
        }

        map = new naver.maps.Map('map', {
            center: new naver.maps.LatLng(37.5172, 127.0473),
            zoom: 14,
            zoomControl: true,
            mapTypeControl: true
        });

        sharedInfoWindow = new naver.maps.InfoWindow({
            borderWidth: 0,
            backgroundColor: "transparent",
            disableAnchor: true,
            pixelOffset: new naver.maps.Point(0, -10)
        });

        naver.maps.Event.addListener(map, 'idle', () => {
            if (!isAutoFitting) {
                if (loadTimeout) clearTimeout(loadTimeout);
                loadTimeout = setTimeout(loadCurrentCategoryData, 300);
            }
        });

        loadCurrentCategoryData(true);
    };
</script>
</body>
</html>
