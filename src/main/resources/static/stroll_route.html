<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도구도구 : 지능형 산책로 시뮬레이터 v6.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=nxnux3f3r1&submodules=geocoder"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; }
        #map { width: 100%; height: 100%; background-color: #f8fafc; }

        #map-loader-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(4px); z-index: 2000;
            align-items: center; justify-content: center; flex-direction: column; gap: 16px;
        }
        #map-loader-overlay.show { display: flex; }

        /* 경로 선택 카드 여백 축소 및 정렬 개선 */
        .route-card {
            flex: 0 0 140px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent; cursor: pointer;
            background-color: #f1f5f9;
        }
        .route-card.active {
            border-color: #22c55e; background-color: white; transform: translateY(-4px);
            box-shadow: 0 10px 20px -5px rgba(34, 197, 94, 0.2);
        }
        .route-badge { background-color: #22c55e; color: white; border-radius: 99px; padding: 2px 8px; font-size: 10px; font-weight: 800; }

        /* 내비게이션 상단 바 */
        #nav-top-banner {
            position: absolute; top: 0; left: 0; width: 100%; height: 120px;
            background: #22c55e; color: white; z-index: 1500; display: none;
            padding: 40px 24px 20px 24px;
        }
        #nav-next-step {
            position: absolute; top: 120px; left: 0; width: 100%; height: 50px;
            background: rgba(241, 245, 249, 0.95); z-index: 1400; display: none;
            align-items: center; padding: 0 24px; border-bottom: 1px solid #e2e8f0;
        }

        .control-btn {
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border: 1px solid #e2e8f0; border-radius: 16px; background-color: white;
            font-size: 1.25rem; font-weight: 700; color: #94a3b8; cursor: pointer;
        }
        .size-btn, .unit-btn {
            flex: 1; padding: 12px 0; border: 1px solid #e2e8f0; border-radius: 16px;
            font-size: 0.875rem; font-weight: 700; color: #64748b; background-color: white; cursor: pointer;
        }
        .size-btn.active, .unit-btn.active {
            border-color: #4f46e5; background-color: #f5f3ff; color: #4f46e5;
        }

        .poi-info-window {
            padding: 16px; min-width: 200px;
            background: white; border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .poi-info-title { font-size: 14px; font-weight: 800; color: #1e293b; margin-bottom: 4px; }
        .poi-info-desc { font-size: 11px; color: #64748b; }

        .scroll-hide::-webkit-scrollbar { display: none; }
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col overflow-hidden text-slate-900 leading-relaxed">

<div id="nav-top-banner">
    <div class="flex items-center justify-between max-w-md mx-auto">
        <div class="flex items-center gap-4">
            <div id="current-turn-icon" class="text-3xl font-black">↑</div>
            <h2 id="current-turn-text" class="text-xl font-extrabold tracking-tight">잠시 후 직진입니다</h2>
        </div>
        <button onclick="exitStrollMode()" class="text-white opacity-80 hover:opacity-100">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
    </div>
</div>
<div id="nav-next-step">
    <div class="flex items-center gap-3 max-w-md mx-auto w-full opacity-40">
        <span id="next-turn-icon" class="font-bold text-sm">→</span>
        <span id="next-turn-text" class="font-bold text-xs">다음 안내가 표시됩니다</span>
    </div>
</div>

<main class="flex-1 flex overflow-hidden relative w-full">
    <aside id="input-panel" class="w-[450px] bg-white border-r border-slate-200 shadow-xl z-40 flex flex-col shrink-0">
        <div class="p-8 space-y-8 overflow-y-auto flex-1">
            <div class="space-y-8">
                <div>
                    <h2 class="text-xl font-extrabold text-slate-800 leading-tight mb-2">몇 가지만 알려주시면<br>맞춤 산책 경로를 추천해드릴게요</h2>
                    <div class="flex items-center gap-3 mt-4">
                        <div class="w-10 h-10 bg-slate-100 rounded-full border border-slate-200 flex items-center justify-center overflow-hidden"><span class="text-lg">🐕</span></div>
                        <span class="text-sm font-bold text-slate-600">동동이 프로필</span>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-sm font-bold text-slate-800 block">반려견 나이 <span class="text-indigo-500">*</span></label>
                    <div class="flex gap-3">
                        <input type="number" id="age-input" placeholder="나이 입력" min="1" oninput="validateAgeInput(this)"
                               class="flex-[1.5] border border-slate-200 rounded-2xl p-4 font-bold text-sm outline-none focus:border-indigo-500 transition-all">
                        <div class="flex-1 flex gap-2">
                            <button onclick="selectAgeUnit('YEAR', this)" id="btn-year" class="unit-btn active">년</button>
                            <button onclick="selectAgeUnit('MONTH', this)" id="btn-month" class="unit-btn">개월</button>
                        </div>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-sm font-bold text-slate-800 block">반려견 크기 <span class="text-indigo-500">*</span></label>
                    <div class="flex gap-2">
                        <button onclick="selectSize('SMALL', this)" class="size-btn">소형견</button>
                        <button onclick="selectSize('MEDIUM', this)" class="size-btn active">중형견</button>
                        <button onclick="selectSize('LARGE', this)" class="size-btn">대형견</button>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-sm font-bold text-slate-800 block">산책 시간</label>
                    <div class="flex items-center">
                        <button onclick="adjustTime(-10)" class="control-btn">−</button>
                        <div id="display-time" class="display-value mx-2 flex-1 h-12 flex items-center justify-center border border-slate-200 rounded-2xl bg-white text-sm font-bold">0분</div>
                        <button onclick="adjustTime(10)" class="control-btn">+</button>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-sm font-bold text-slate-800 block pt-4">산책 거리</label>
                    <div class="relative flex items-center">
                        <button onclick="adjustDist(-0.5)" class="control-btn">−</button>
                        <div id="display-dist" class="display-value mx-2 flex-1 h-12 flex items-center justify-center border border-slate-200 rounded-2xl bg-white text-sm font-bold">0.0km</div>
                        <button onclick="adjustDist(0.5)" class="control-btn">+</button>
                    </div>
                </div>

                <button onclick="requestSmartRoutes()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black text-base hover:bg-indigo-600 active:scale-[0.98] transition-all shadow-xl flex items-center justify-center gap-3">
                    <span>최적 산책 경로 생성</span>
                    <div id="loader" class="w-5 h-5 border-3 border-white border-t-transparent rounded-full animate-spin hidden"></div>
                </button>
            </div>
        </div>
    </aside>

    <div class="flex-1 relative min-w-0 h-full">
        <div id="map" class="w-full h-full"></div>
        <div id="map-loader-overlay">
            <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-indigo-600 font-black text-lg">산책 경로 생성중...</p>
        </div>

        <!-- [수정] max-w를 줄여 좌우 여백을 줄이고 카드들을 밀착 시킴 -->
        <div id="result-overlay" class="absolute bottom-8 left-0 w-full px-4 z-[1000] hidden">
            <div class="max-w-2xl mx-auto bg-white/95 backdrop-blur-md p-5 rounded-[40px] shadow-2xl border border-white/50">
                <div class="flex justify-between items-center mb-4 px-4">
                    <button onclick="backToSettings()" class="text-[11px] font-bold text-slate-400 hover:text-indigo-600 flex items-center gap-1 transition-colors">← 다시 설정</button>
                    <h3 class="text-xs font-black text-slate-800">원하시는 경로를 선택하세요</h3>
                    <div class="w-10"></div>
                </div>
                <!-- gap-3으로 간격을 줄여 조밀하게 배치 -->
                <div id="route-cards-container" class="flex justify-center gap-3 pb-5 scroll-hide w-full">
                    <!-- JS로 렌더링 -->
                </div>
                <button id="btn-start-stroll" onclick="enterStrollMode()" class="w-full bg-[#22c55e] text-white py-4 rounded-3xl font-black text-lg shadow-lg hover:scale-[1.01] active:scale-95 transition-all">
                    산책 시작
                </button>
            </div>
        </div>

        <div id="stroll-metrics" class="absolute bottom-32 left-10 z-[1000] hidden">
            <div class="bg-white p-6 rounded-[32px] shadow-2xl border border-slate-100 space-y-3 min-w-[180px]">
                <div class="flex justify-between items-center gap-6">
                    <span class="text-xs font-bold text-slate-400">산책 시간</span>
                    <span id="metric-time" class="text-sm font-black text-slate-800">00:00</span>
                </div>
                <div class="flex justify-between items-center gap-6">
                    <span class="text-xs font-bold text-slate-400">이동 거리</span>
                    <span id="metric-dist" class="text-sm font-black text-slate-800">00m</span>
                </div>
            </div>
        </div>
        <div id="btn-finish-container" class="absolute bottom-10 left-1/2 -translate-x-1/2 w-full max-w-md px-6 z-[1000] hidden">
            <button onclick="exitStrollMode()" class="w-full bg-[#22c55e] text-white py-5 rounded-3xl font-black text-lg shadow-xl">
                산책 종료
            </button>
        </div>
    </div>
</main>

<script>
    let map, startMarker, infoWindow, currentPos = { lat: 37.5172, lon: 127.0473 }, polylines = [], poiMarkers = [];
    let selectedSize = 'MEDIUM', selectedAgeUnit = 'YEAR', walkTime = 0, walkDist = 0.0;
    let recommendedRoutes = [], activeRouteIdx = 0;
    let strollTimer = null, startTime = null;

    window.onload = function() { initMap(); };

    function validateAgeInput(input) {
        if (input.value !== '' && parseInt(input.value) <= 0) {
            input.value = '';
        }
    }

    function initMap() {
        map = new naver.maps.Map('map', {
            center: new naver.maps.LatLng(currentPos.lat, currentPos.lon),
            zoom: 15,
            padding: { top: 20, right: 20, bottom: 20, left: 20 }
        });
        infoWindow = new naver.maps.InfoWindow({ borderWidth: 0, backgroundColor: "transparent", disableAnchor: true, pixelOffset: new naver.maps.Point(0, -10) });

        startMarker = new naver.maps.Marker({
            position: map.getCenter(), map: map, zIndex: 1000,
            icon: { content: '<div class="w-10 h-10 flex items-center justify-center"><div class="w-5 h-5 bg-red-500 border-4 border-white rounded-full shadow-lg ring-4 ring-red-100"></div></div>', anchor: new naver.maps.Point(20, 20) }
        });

        naver.maps.Event.addListener(map, 'click', e => {
            currentPos = { lat: e.coord.lat(), lon: e.coord.lng() };
            startMarker.setPosition(e.coord);
            map.panTo(e.coord);
        });

        window.addEventListener('resize', updateMapLayout);
    }

    function updateMapLayout() {
        if (map) {
            // 브라우저 렌더링 타이밍을 맞추기 위해 rAF 사용
            window.requestAnimationFrame(() => {
                map.autoResize();
                const center = map.getCenter();
                map.setCenter(center);
            });
        }
    }

    function selectAgeUnit(unit, btn) {
        selectedAgeUnit = unit;
        document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    function selectSize(size, btn) {
        selectedSize = size;
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    function adjustTime(val) { walkTime = Math.max(0, Math.min(180, walkTime + val)); document.getElementById('display-time').innerText = `${walkTime}분`; }
    function adjustDist(val) { walkDist = Math.max(0, Math.min(15, parseFloat((walkDist + val).toFixed(1)))); document.getElementById('display-dist').innerText = `${walkDist}km`; }

    async function requestSmartRoutes() {
        const ageInput = document.getElementById('age-input');
        const ageVal = parseInt(ageInput.value || 0);
        if (ageVal <= 0) { alert("반려견 나이를 입력해주세요."); ageInput.focus(); return; }

        document.getElementById('map-loader-overlay').classList.add('show');

        try {
            const response = await fetch('/api/v1/stroll/route/recommend', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    latitude: currentPos.lat, longitude: currentPos.lon,
                    dogSize: selectedSize, dogAge: ageVal, dogAgeUnit: selectedAgeUnit,
                    walkingDistance: walkDist > 0.01 ? walkDist : null,
                    walkingTime: walkTime > 0 ? walkTime : null
                })
            });
            recommendedRoutes = await response.json();
            renderRouteResults();
            showResultMode();
        } catch (e) { alert("경로 생성 중 오류 발생"); }
        finally { document.getElementById('map-loader-overlay').classList.remove('show'); }
    }

    function renderRouteResults() {
        const container = document.getElementById('route-cards-container');
        container.innerHTML = '';
        polylines.forEach(p => p.setMap(null)); polylines = [];
        clearPoiMarkers();

        recommendedRoutes.forEach((route, idx) => {
            const card = document.createElement('div');
            // 카드 크기 고정 및 간격 유지
            card.className = `route-card p-4 rounded-[28px] flex flex-col gap-0.5 ${idx === 0 ? 'active' : ''}`;
            card.innerHTML = `
                <span class="route-badge w-fit mb-1.5">경로${idx+1}</span>
                <span class="text-xl font-black text-slate-800">${route.estimatedTime}<small class="text-[10px] font-bold ml-0.5">분</small></span>
                <span class="text-[10px] font-bold text-slate-400 tracking-tight">${(route.totalDistance/1000).toFixed(1)}km</span>
            `;
            card.onclick = () => focusRoute(idx);
            container.appendChild(card);

            const poly = new naver.maps.Polyline({
                map: map, path: route.path.map(c => new naver.maps.LatLng(c.latitude, c.longitude)),
                strokeColor: idx === 0 ? '#22c55e' : '#cbd5e1', strokeWeight: idx === 0 ? 8 : 4, strokeOpacity: idx === 0 ? 1 : 0.4, zIndex: idx === 0 ? 100 : 10
            });
            polylines.push(poly);
        });
        if (recommendedRoutes.length > 0) focusRoute(0);
    }

    function focusRoute(idx) {
        activeRouteIdx = idx;
        const cards = document.querySelectorAll('.route-card');
        cards.forEach((c, i) => i === idx ? c.classList.add('active') : c.classList.remove('active'));

        polylines.forEach((p, i) => {
            p.setOptions({
                strokeColor: i === idx ? '#22c55e' : '#cbd5e1',
                strokeWeight: i === idx ? 8 : 4,
                strokeOpacity: i === idx ? 1 : 0.4,
                zIndex: i === idx ? 100 : 10
            });
        });

        showRouteWaypoints(recommendedRoutes[idx]);
        const bounds = new naver.maps.LatLngBounds();
        recommendedRoutes[idx].path.forEach(c => bounds.extend(new naver.maps.LatLng(c.latitude, c.longitude)));
        map.fitBounds(bounds, { top: 100, right: 100, bottom: 280, left: 100 });
    }

    function showResultMode() {
        const inputPanel = document.getElementById('input-panel');
        inputPanel.style.display = 'none';
        document.getElementById('result-overlay').classList.remove('hidden');

        // 레이아웃이 바뀐 뒤 지도를 다시 그림
        setTimeout(updateMapLayout, 50);
        setTimeout(updateMapLayout, 300); // 확실히 한 번 더 호출
    }

    function backToSettings() {
        document.getElementById('input-panel').style.display = 'flex';
        document.getElementById('result-overlay').classList.add('hidden');
        setTimeout(updateMapLayout, 50);
    }

    function enterStrollMode() {
        document.getElementById('result-overlay').classList.add('hidden');
        document.getElementById('nav-top-banner').style.display = 'block';
        document.getElementById('nav-next-step').style.display = 'flex';
        document.getElementById('stroll-metrics').classList.remove('hidden');
        document.getElementById('btn-finish-container').classList.remove('hidden');
        setTimeout(updateMapLayout, 100);
        updateNavGuide(0);
        startTrackingMetrics();
    }

    function exitStrollMode() {
        if (!confirm("산책을 종료하시겠습니까?")) return;
        clearInterval(strollTimer);
        location.reload();
    }

    function updateNavGuide(guideIdx) {
        const route = recommendedRoutes[activeRouteIdx];
        if (!route || !route.navigationGuides) return;
        const guides = route.navigationGuides.filter(g => [12, 13, 14, 16, 17, 18, 19].includes(g.turnType));
        if (guides.length > 0) {
            const current = guides[0];
            document.getElementById('current-turn-icon').innerText = getTurnIcon(current.turnType);
            document.getElementById('current-turn-text').innerText = cleanTurnText(current.description, current.pointName);
            if (guides.length > 1) {
                document.getElementById('next-turn-icon').innerText = getTurnIcon(guides[1].turnType);
                document.getElementById('next-turn-text').innerText = "잠시 후 직진";
            }
        }
    }

    function startTrackingMetrics() {
        startTime = new Date();
        strollTimer = setInterval(() => {
            const now = new Date();
            const diff = Math.floor((now - startTime) / 1000);
            const m = String(Math.floor(diff / 60)).padStart(2, '0');
            const s = String(diff % 60).padStart(2, '0');
            document.getElementById('metric-time').innerText = `${m}:${s}`;
            document.getElementById('metric-dist').innerText = `450m`;
        }, 1000);
    }

    function cleanTurnText(desc, pointName) {
        let base = desc.replace(/\s*\d+(\.\d+)?(m|km)\s*이동/g, "").trim();
        let direction = base.includes("좌회전") ? "왼쪽" : (base.includes("우회전") ? "오른쪽" : (base.includes("유턴") ? "유턴" : "오른쪽"));
        return `${pointName || '이 지점'}에서 ${direction}`;
    }

    function getTurnIcon(type) {
        if ([12, 16, 17].includes(type)) return '←';
        if ([13, 18, 19].includes(type)) return '→';
        return '↑';
    }

    function showRouteWaypoints(route) {
        clearPoiMarkers();
        if (!route || !route.waypoints) return;

        route.waypoints.forEach(wp => {
            if (wp.category === 'START' || wp.category === 'END') return;

            let bgColor = wp.category === 'TRASH_BIN' ? 'bg-indigo-600' : (wp.category === 'FOUNTAIN' ? 'bg-sky-400' : 'bg-amber-400');
            let icon = wp.category === 'TRASH_BIN' ? '🗑️' : (wp.category === 'FOUNTAIN' ? '💧' : '🚩');
            let label = wp.category === 'TRASH_BIN' ? '쓰레기통' : (wp.category === 'FOUNTAIN' ? '음수대' : '반환점');
            let detail = wp.category === 'TRASH_BIN' ? '배변 봉투를 버릴 수 있어요' : (wp.category === 'FOUNTAIN' ? '신선한 물을 마실 수 있어요' : '코스의 반환 지점입니다');

            const marker = new naver.maps.Marker({
                position: new naver.maps.LatLng(wp.latitude, wp.longitude),
                map: map,
                icon: {
                    content: `<div class="w-12 h-12 ${bgColor} border-2 border-white rounded-full shadow-2xl flex items-center justify-center text-lg transform hover:scale-125 transition-transform cursor-pointer">${icon}</div>`,
                    anchor: new naver.maps.Point(24, 24)
                },
                zIndex: 1000
            });

            naver.maps.Event.addListener(marker, 'click', () => {
                infoWindow.setContent(`
                    <div class="poi-info-window">
                        <p class="poi-info-title">${label}</p>
                        <p class="poi-info-desc">${detail}</p>
                    </div>
                `);
                infoWindow.open(map, marker);
            });

            poiMarkers.push(marker);
        });
    }

    function clearPoiMarkers() { poiMarkers.forEach(m => m.setMap(null)); poiMarkers = []; if(infoWindow) infoWindow.close(); }
</script>
</body>
</html>
