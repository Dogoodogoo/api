<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도구도구 : 지능형 산책로 시뮬레이터 v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=nxnux3f3r1&submodules=geocoder"></script>
    <style>
        #map { width: 100%; height: 100%; background-color: #f8fafc; }
        .path-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .path-card.active { border-color: #6366f1; background-color: #eef2ff; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.1); }
        .score-badge { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .error-badge { background: #ef4444; }
        #loader { display: none; }
        #loader.show { display: flex; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col overflow-hidden font-sans">

<!-- 상단 내비게이션 -->
<nav class="bg-white border-b border-slate-200 p-4 h-[70px] flex items-center justify-between shadow-sm z-50">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A2 2 0 013 15.483V4a2 2 0 012.724-1.789L9 4m0 16l5-2.5m-5 2.5V4m5 13.5V4m0 13.5l5.447 2.724A2 2 0 0021 18.517V7a2 2 0 00-2.724-1.789L15 7m-5 13.5V4" />
            </svg>
        </div>
        <div>
            <h1 class="text-lg font-black text-slate-800 italic uppercase tracking-tight">Dogoo Stroll Engine</h1>
            <p class="text-[9px] text-slate-400 font-bold tracking-widest uppercase">Intelligent GA Optimizer v4.0</p>
        </div>
    </div>
    <div class="flex items-center gap-6">
        <div class="flex gap-4 text-[10px] font-black text-slate-400 uppercase tracking-tighter">
            <span class="flex items-center gap-1"><div class="w-2 h-2 bg-red-500 rounded-full"></div> Start</span>
            <span class="flex items-center gap-1"><div class="w-2 h-2 bg-indigo-500 rounded-full"></div> Trash</span>
            <span class="flex items-center gap-1"><div class="w-2 h-2 bg-sky-400 rounded-full"></div> Fountain</span>
            <span class="flex items-center gap-1"><div class="w-2 h-2 bg-amber-400 rounded-full"></div> Pivot</span>
        </div>
    </div>
</nav>

<!-- 메인 컨텐츠 -->
<main class="flex-1 flex overflow-hidden">
    <!-- 좌측 패널 -->
    <aside class="w-[400px] bg-white border-r border-slate-200 shadow-xl z-40 flex flex-col">
        <div class="p-6 space-y-6 overflow-y-auto flex-1">
            <section class="space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">추천 엔진 설정</h2>
                    <span class="text-[10px] px-2 py-0.5 bg-slate-100 text-slate-500 rounded-full font-bold">API v2</span>
                </div>

                <div class="space-y-3">
                    <label class="block">
                        <span class="text-[11px] font-black text-slate-500 ml-1">반려견 체급</span>
                        <select id="dog-size" class="mt-1 w-full bg-slate-50 border-slate-200 border p-3 rounded-2xl font-bold text-sm focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
                            <option value="">체급 선택 (랜덤 범위 적용)</option>
                            <option value="SMALL">소형견 (1~3km)</option>
                            <option value="MEDIUM">중형견 (3~5km)</option>
                            <option value="LARGE">대형견 (5~10km)</option>
                        </select>
                    </label>

                    <div class="grid grid-cols-2 gap-3">
                        <label>
                            <span class="text-[11px] font-black text-slate-500 ml-1">희망 거리 (km)</span>
                            <input type="number" id="walk-dist" step="0.1" placeholder="예: 3.5" class="mt-1 w-full bg-slate-50 border-slate-200 border p-3 rounded-2xl font-bold text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                        </label>
                        <label>
                            <span class="text-[11px] font-black text-slate-500 ml-1">희망 시간 (분)</span>
                            <input type="number" id="walk-time" placeholder="예: 45" class="mt-1 w-full bg-slate-50 border-slate-200 border p-3 rounded-2xl font-bold text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                        </label>
                    </div>
                </div>

                <button onclick="requestSmartRoutes()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-sm hover:bg-indigo-600 active:scale-[0.98] transition-all shadow-lg shadow-slate-200 flex items-center justify-center gap-2">
                    <span>최적 산책 경로 생성</span>
                    <div id="loader" class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                </button>
            </section>

            <div class="h-px bg-slate-100"></div>

            <section class="space-y-4">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">추천 결과 목록</h2>
                <div id="route-list" class="space-y-3">
                    <div class="text-center py-12 text-slate-300">
                        <p class="text-xs font-bold">지도를 클릭하여 시작점을 지정하고<br>조건을 입력한 뒤 경로를 생성하세요.</p>
                    </div>
                </div>
            </section>
        </div>

        <div class="p-4 bg-slate-50 border-t border-slate-100">
            <p class="text-[10px] text-slate-400 text-center font-medium">© 2026 DogooDogoo Intelligent Stroll Service</p>
        </div>
    </aside>

    <!-- 우측 지도 패널 -->
    <div class="flex-1 relative">
        <div id="map"></div>
        <div class="absolute top-6 left-6 z-10 pointer-events-none">
            <div class="bg-white/90 backdrop-blur-sm px-4 py-2 rounded-2xl shadow-xl border border-white/50 flex items-center gap-3">
                <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                <p class="text-[11px] font-black text-slate-700 uppercase tracking-tighter">Click map to set start point</p>
            </div>
        </div>
    </div>
</main>

<script>
    let map, startMarker, infoWindow, currentPos = { lat: 37.5172, lon: 127.0473 }, polylines = [], poiMarkers = [];
    const API_URL = '/api/v1/stroll/route/recommend';

    window.onload = function() {
        initMap();
    };

    function initMap() {
        map = new naver.maps.Map('map', {
            center: new naver.maps.LatLng(currentPos.lat, currentPos.lon),
            zoom: 15,
            zoomControl: true,
            mapTypeControl: true
        });

        infoWindow = new naver.maps.InfoWindow({
            borderWidth: 0,
            backgroundColor: "transparent",
            disableAnchor: true
        });

        startMarker = new naver.maps.Marker({
            position: map.getCenter(),
            map: map,
            icon: {
                content: '<div class="w-10 h-10 flex items-center justify-center"><div class="w-5 h-5 bg-red-500 border-4 border-white rounded-full shadow-lg ring-4 ring-red-100"></div></div>',
                anchor: new naver.maps.Point(20, 20)
            },
            zIndex: 1000
        });

        naver.maps.Event.addListener(map, 'click', function(e) {
            currentPos = { lat: e.coord.lat(), lon: e.coord.lng() };
            startMarker.setPosition(e.coord);
            map.panTo(e.coord);
        });
    }

    async function requestSmartRoutes() {
        const loader = document.getElementById('loader');
        const size = document.getElementById('dog-size').value;
        const dist = document.getElementById('walk-dist').value;
        const time = document.getElementById('walk-time').value;

        if (!size && !dist && !time) {
            alert("테스트를 위해 최소 하나의 조건은 입력해야 합니다.");
            return;
        }

        loader.classList.add('show');

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    latitude: currentPos.lat,
                    longitude: currentPos.lon,
                    dogSize: size || null,
                    walkingDistance: dist ? parseFloat(dist) : null,
                    walkingTime: time ? parseInt(time) : null
                })
            });

            if (!response.ok) throw new Error('API 호출 실패');
            const data = await response.json();
            renderRouteResults(data);
        } catch (e) {
            console.error(e);
            alert("경로 생성 중 오류가 발생했습니다. 서버 로그를 확인하세요.");
        } finally {
            loader.classList.remove('show');
        }
    }

    function renderRouteResults(routes) {
        const listContainer = document.getElementById('route-list');
        listContainer.innerHTML = '';

        polylines.forEach(p => p.setMap(null));
        polylines = [];
        clearPoiMarkers();

        const colors = ['#6366f1', '#10b981', '#f59e0b'];

        routes.forEach((route, idx) => {
            const isError = !route.path || route.path.length === 0;
            const card = document.createElement('div');
            card.className = `path-card p-4 border ${isError ? 'border-red-100 bg-red-50 shadow-inner' : 'border-slate-100'} rounded-2xl cursor-pointer hover:bg-slate-50 mb-3`;

            card.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <h3 class="text-sm font-black ${isError ? 'text-red-600' : 'text-slate-800'}">${route.strollName}</h3>
                    <div class="${isError ? 'error-badge' : 'score-badge'} px-2 py-0.5 rounded-lg text-[9px] text-white font-black uppercase">
                        ${isError ? 'API Reject' : 'Match ' + route.matchScore.toFixed(1)}
                    </div>
                </div>
                ${isError ?
                `<p class="text-[10px] text-red-500 font-black mb-1">근거리 간섭 발생 (100m 미만)</p>
                     <p class="text-[9px] text-red-400 font-bold leading-tight">알고리즘이 선정한 POI 좌표가 너무 가깝습니다. 서버 로직의 제약 조건을 강화해야 합니다.</p>` :
                `<div class="flex items-center gap-3 text-[11px] text-slate-500 font-bold">
                        <span class="flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg> ${(route.totalDistance/1000).toFixed(2)}km</span>
                        <span class="flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> ${route.estimatedTime}분</span>
                    </div>`
            }
            `;

            card.onclick = () => focusRoute(routes, idx);

            if (!isError) {
                const poly = new naver.maps.Polyline({
                    map: map,
                    path: route.path.map(c => new naver.maps.LatLng(c.latitude, c.longitude)),
                    strokeColor: colors[idx % 3],
                    strokeWeight: 6,
                    strokeOpacity: 0.3,
                    zIndex: 100
                });
                polylines.push(poly);
            }
            listContainer.appendChild(card);
        });

        const firstValidIdx = routes.findIndex(r => r.path && r.path.length > 0);
        focusRoute(routes, firstValidIdx !== -1 ? firstValidIdx : 0);
    }

    function focusRoute(routes, idx) {
        if (!routes || routes.length === 0) return;

        const cards = document.querySelectorAll('.path-card');
        cards.forEach((c, i) => {
            if (i === idx) c.classList.add('active');
            else c.classList.remove('active');
        });

        polylines.forEach((p, i) => {
            const polyIdx = routes.slice(0, idx).filter(r => r.path && r.path.length > 0).length;
            if (routes[idx].path && routes[idx].path.length > 0) {
                p.setOptions({
                    strokeOpacity: i === polyIdx ? 0.9 : 0.1,
                    strokeWeight: i === polyIdx ? 8 : 4,
                    zIndex: i === polyIdx ? 500 : 100
                });
            }
        });

        showRouteWaypoints(routes[idx]);

        if (routes[idx].path && routes[idx].path.length > 0) {
            const bounds = new naver.maps.LatLngBounds();
            routes[idx].path.forEach(c => bounds.extend(new naver.maps.LatLng(c.latitude, c.longitude)));
            map.fitBounds(bounds, { top: 50, right: 50, bottom: 50, left: 50 });
        }
    }

    function showRouteWaypoints(route) {
        clearPoiMarkers();
        if (!route || !route.waypoints) return;

        route.waypoints.forEach(wp => {
            if (wp.category === 'START' || wp.category === 'END') return;

            let bgColor = 'bg-slate-400', icon = '📍';
            if (wp.category === 'TRASH_BIN') { bgColor = 'bg-indigo-600'; icon = '🗑️'; }
            else if (wp.category === 'FOUNTAIN') { bgColor = 'bg-sky-400'; icon = '💧'; }
            else if (wp.category === 'PIVOT') { bgColor = 'bg-amber-400'; icon = '🚩'; }

            const marker = new naver.maps.Marker({
                position: new naver.maps.LatLng(wp.latitude, wp.longitude),
                map: map,
                icon: {
                    content: `<div class="w-8 h-8 ${bgColor} border-2 border-white rounded-full shadow-lg flex items-center justify-center text-[10px] text-white font-bold transition-transform hover:scale-125 cursor-pointer">${icon}</div>`,
                    anchor: new naver.maps.Point(16, 16)
                },
                zIndex: 1000
            });

            naver.maps.Event.addListener(marker, 'click', () => {
                infoWindow.setContent(`
                    <div class="bg-white px-3 py-2 rounded-xl shadow-2xl border border-slate-100">
                        <p class="text-[10px] font-black text-indigo-600 uppercase mb-0.5">${wp.category}</p>
                        <p class="text-xs font-bold text-slate-800">${wp.name}</p>
                    </div>
                `);
                infoWindow.open(map, marker);
            });

            poiMarkers.push(marker);
        });
    }

    function clearPoiMarkers() {
        poiMarkers.forEach(m => m.setMap(null));
        poiMarkers = [];
        if (infoWindow) infoWindow.close();
    }
</script>
</body>
</html>
