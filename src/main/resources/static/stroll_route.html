<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도구도구 : 지능형 산책로 시뮬레이터 v6.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=nxnux3f3r1&submodules=geocoder"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* [이슈 해결] 지도 컨테이너 flex 구조 강화 */
        #main-layout { flex: 1; display: flex; overflow: hidden; width: 100%; position: relative; }
        #map-section { flex: 1; position: relative; min-width: 0; height: 100%; }
        #map { width: 100% !important; height: 100% !important; background-color: #f8fafc; }

        #map-loader-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); z-index: 2000;
            align-items: center; justify-content: center; flex-direction: column; gap: 16px;
        }
        #map-loader-overlay.show { display: flex; }

        /* [이슈 해결] 경로 선택 카드 가운데 정렬 및 여백 조정 */
        .route-card {
            width: 140px; min-width: 140px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent; cursor: pointer; background-color: #f1f5f9;
        }
        .route-card.active {
            border-color: #22c55e; background-color: white; transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgba(34, 197, 94, 0.15);
        }
        .route-badge { background-color: #22c55e; color: white; border-radius: 99px; padding: 2px 8px; font-size: 10px; font-weight: 800; }

        #nav-top-banner {
            position: absolute; top: 0; left: 0; width: 100%; height: 120px;
            background: #22c55e; color: white; z-index: 1500; display: none;
            padding: 40px 24px 20px 24px;
        }

        .poi-info-window { padding: 12px; min-width: 160px; text-align: center; }
        .poi-info-title { font-size: 13px; font-weight: 800; color: #1e293b; }

        .scroll-hide::-webkit-scrollbar { display: none; }
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .control-btn {
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border: 1px solid #e2e8f0; border-radius: 16px; background-color: white;
            font-size: 1.25rem; font-weight: 700; color: #94a3b8; cursor: pointer;
        }
        .size-btn, .unit-btn {
            flex: 1; padding: 12px 0; border: 1px solid #e2e8f0; border-radius: 16px;
            font-size: 0.875rem; font-weight: 700; color: #64748b; background-color: white; cursor: pointer;
        }
        .size-btn.active, .unit-btn.active {
            border-color: #4f46e5; background-color: #f5f3ff; color: #4f46e5;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

<nav class="bg-white border-b border-slate-200 p-4 h-[70px] flex items-center justify-between shadow-sm z-50 shrink-0">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
            <span class="text-xl">🐕</span>
        </div>
        <div>
            <h1 class="text-lg font-black text-slate-800 italic uppercase leading-none">DogooDogoo</h1>
            <p class="text-[9px] text-slate-400 font-bold uppercase mt-1">Final Stabilized v6.5</p>
        </div>
    </div>
</nav>

<div id="main-layout">
    <!-- 좌측 입력 패널 -->
    <aside id="input-panel" class="w-[420px] bg-white border-r border-slate-200 shadow-xl z-40 flex flex-col shrink-0">
        <div class="p-8 space-y-8 overflow-y-auto flex-1">
            <div class="space-y-8">
                <div>
                    <h2 class="text-xl font-extrabold text-slate-800 leading-tight mb-2">몇 가지만 알려주시면<br>맞춤 산책 경로를 추천해드릴게요</h2>
                    <div class="flex items-center gap-3 mt-4 text-slate-400">
                        <span class="text-sm font-bold">동동이 프로필</span>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-sm font-bold text-slate-800 block">반려견 나이 <span class="text-indigo-500">*</span></label>
                    <div class="flex gap-3">
                        <input type="number" id="age-input" placeholder="나이" min="1" oninput="if(this.value <= 0) this.value = ''"
                               class="flex-[1.5] border border-slate-200 rounded-2xl p-4 font-bold text-sm outline-none focus:border-indigo-500 transition-all">
                        <div class="flex-1 flex gap-2">
                            <button onclick="selectAgeUnit('YEAR', this)" id="btn-year" class="unit-btn active">년</button>
                            <button onclick="selectAgeUnit('MONTH', this)" id="btn-month" class="unit-btn">개월</button>
                        </div>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-sm font-bold text-slate-800 block">반려견 크기 <span class="text-indigo-500">*</span></label>
                    <div class="flex gap-2">
                        <button onclick="selectSize('SMALL', this)" class="size-btn">소형견</button>
                        <button onclick="selectSize('MEDIUM', this)" class="size-btn active">중형견</button>
                        <button onclick="selectSize('LARGE', this)" class="size-btn">대형견</button>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-sm font-bold text-slate-800 block">산책 시간</label>
                    <div class="flex items-center">
                        <button onclick="adjustTime(-10)" class="control-btn">−</button>
                        <div id="display-time" class="display-value mx-2 flex-1 h-12 flex items-center justify-center border border-slate-200 rounded-2xl bg-white text-sm font-bold">0분</div>
                        <button onclick="adjustTime(10)" class="control-btn">+</button>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-sm font-bold text-slate-800 block pt-4">산책 거리</label>
                    <div class="relative flex items-center">
                        <button onclick="adjustDist(-0.5)" class="control-btn">−</button>
                        <div id="display-dist" class="display-value mx-2 flex-1 h-12 flex items-center justify-center border border-slate-200 rounded-2xl bg-white text-sm font-bold">0.0km</div>
                        <button onclick="adjustDist(0.5)" class="control-btn">+</button>
                    </div>
                </div>

                <button onclick="requestSmartRoutes()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black text-base hover:bg-indigo-600 active:scale-[0.98] transition-all shadow-xl">
                    최적 산책 경로 생성
                </button>
            </div>
        </div>
    </aside>

    <!-- 우측 지도 영역 (flex-1 및 min-w-0으로 여백 버그 해결) -->
    <section id="map-section">
        <div id="map"></div>
        <div id="map-loader-overlay">
            <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-indigo-600 font-black text-lg">산책 경로 생성중...</p>
        </div>

        <!-- 하단 경로 선택 오버레이 (justify-center 반영) -->
        <div id="result-overlay" class="absolute bottom-10 left-0 w-full px-6 z-[1000] hidden">
            <div class="max-w-2xl mx-auto bg-white/95 backdrop-blur-md p-6 rounded-[40px] shadow-2xl border border-white/50">
                <div class="flex justify-between items-center mb-6 px-4">
                    <button onclick="backToSettings()" class="text-xs font-bold text-slate-400 hover:text-indigo-600 transition-colors">← 다시 설정</button>
                    <h3 class="text-sm font-black text-slate-800">원하시는 경로를 선택하세요</h3>
                    <div class="w-10"></div>
                </div>
                <!-- justify-center로 카드 중앙 정렬 보장 -->
                <div id="route-cards-container" class="flex justify-center gap-4 pb-6 scroll-hide"></div>
                <button onclick="enterStrollMode()" class="w-full bg-[#22c55e] text-white py-5 rounded-3xl font-black text-lg shadow-lg hover:scale-[1.01] active:scale-95 transition-all">
                    산책 시작
                </button>
            </div>
        </div>

        <!-- 내비게이션 배너 -->
        <div id="nav-top-banner">
            <div class="flex items-center justify-between max-w-md mx-auto">
                <div class="flex items-center gap-4">
                    <div id="nav-icon" class="text-3xl font-black">↑</div>
                    <h2 id="nav-text" class="text-xl font-extrabold tracking-tight">잠시 후 직진</h2>
                </div>
                <button onclick="location.reload()" class="text-white text-2xl font-bold">✕</button>
            </div>
        </div>
    </section>
</div>

<script>
    let map, startMarker, infoWindow, currentPos = { lat: 37.5172, lon: 127.0473 }, polylines = [], poiMarkers = [];
    let selectedSize = 'MEDIUM', selectedAgeUnit = 'YEAR', walkTime = 0, walkDist = 0.0;
    let recommendedRoutes = [], activeRouteIdx = 0;

    window.onload = function() { initMap(); };

    function initMap() {
        map = new naver.maps.Map('map', { center: new naver.maps.LatLng(currentPos.lat, currentPos.lon), zoom: 15 });
        infoWindow = new naver.maps.InfoWindow({ borderWidth: 0, backgroundColor: "white", disableAnchor: true, pixelOffset: new naver.maps.Point(0, -10) });
        startMarker = new naver.maps.Marker({
            position: map.getCenter(), map: map, zIndex: 1000,
            icon: { content: '<div class="w-10 h-10 flex items-center justify-center"><div class="w-5 h-5 bg-red-500 border-4 border-white rounded-full shadow-lg ring-4 ring-red-100"></div></div>', anchor: new naver.maps.Point(20, 20) }
        });
        naver.maps.Event.addListener(map, 'click', e => {
            currentPos = { lat: e.coord.lat(), lon: e.coord.lng() };
            startMarker.setPosition(e.coord);
            map.panTo(e.coord);
        });
        window.addEventListener('resize', () => { if(map) map.autoResize(); });
    }

    function selectAgeUnit(unit, btn) {
        selectedAgeUnit = unit;
        document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    function selectSize(size, btn) {
        selectedSize = size;
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    function adjustTime(val) { walkTime = Math.max(0, walkTime + val); document.getElementById('display-time').innerText = `${walkTime}분`; }
    function adjustDist(val) { walkDist = Math.max(0, parseFloat((walkDist + val).toFixed(1))); document.getElementById('display-dist').innerText = `${walkDist}km`; }

    async function requestSmartRoutes() {
        const ageVal = parseInt(document.getElementById('age-input').value || 0);
        if (ageVal <= 0) { alert("반려견 나이를 입력해주세요."); return; }

        document.getElementById('map-loader-overlay').classList.add('show');
        try {
            const response = await fetch('/api/v1/stroll/route/recommend', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    latitude: currentPos.lat, longitude: currentPos.lon,
                    dogSize: selectedSize, dogAge: ageVal, dogAgeUnit: selectedAgeUnit,
                    walkingDistance: walkDist > 0 ? walkDist : null,
                    walkingTime: walkTime > 0 ? walkTime : null
                })
            });
            recommendedRoutes = await response.json();
            renderRouteResults();
            toggleResultMode(true);
        } catch (e) { alert("경로 생성 중 오류 발생"); }
        finally { document.getElementById('map-loader-overlay').classList.remove('show'); }
    }

    function renderRouteResults() {
        const container = document.getElementById('route-cards-container');
        container.innerHTML = '';
        polylines.forEach(p => p.setMap(null)); polylines = [];
        clearPoiMarkers();

        recommendedRoutes.forEach((route, idx) => {
            const card = document.createElement('div');
            card.className = `route-card p-5 rounded-[32px] flex flex-col gap-1 ${idx === 0 ? 'active' : ''}`;
            card.innerHTML = `
                <span class="route-badge w-fit mb-2">경로${idx+1}</span>
                <span class="text-2xl font-black text-slate-800">${route.estimatedTime}<small class="text-xs font-bold">분</small></span>
                <span class="text-[10px] font-bold text-slate-400 tracking-tight">${(route.totalDistance/1000).toFixed(1)}km</span>
            `;
            card.onclick = () => focusRoute(idx);
            container.appendChild(card);

            const poly = new naver.maps.Polyline({
                map: map, path: route.path.map(c => new naver.maps.LatLng(c.latitude, c.longitude)),
                strokeColor: idx === 0 ? '#22c55e' : '#cbd5e1', strokeWeight: idx === 0 ? 8 : 4, strokeOpacity: idx === 0 ? 1 : 0.4, zIndex: idx === 0 ? 100 : 10
            });
            polylines.push(poly);
        });
        if (recommendedRoutes.length > 0) focusRoute(0);
    }

    function focusRoute(idx) {
        activeRouteIdx = idx;
        document.querySelectorAll('.route-card').forEach((c, i) => i === idx ? c.classList.add('active') : c.classList.remove('active'));
        polylines.forEach((p, i) => p.setOptions({ strokeColor: i === idx ? '#22c55e' : '#cbd5e1', strokeWeight: i === idx ? 8 : 4, strokeOpacity: i === idx ? 1 : 0.4, zIndex: i === idx ? 100 : 10 }));

        showWaypoints(recommendedRoutes[idx]);
        const bounds = new naver.maps.LatLngBounds();
        recommendedRoutes[idx].path.forEach(c => bounds.extend(new naver.maps.LatLng(c.latitude, c.longitude)));
        map.fitBounds(bounds, { top: 100, right: 100, bottom: 280, left: 100 });
    }

    /**
     * [이슈 해결] 경유지 커스텀 마커 시각화 (아이콘 포함)
     */
    function showWaypoints(route) {
        clearPoiMarkers();
        route.waypoints.forEach(wp => {
            if (wp.category === 'START' || wp.category === 'END') return;

            let icon = '🚩', color = 'bg-amber-400';
            if (wp.category === 'TRASH_BIN') { icon = '🗑️'; color = 'bg-indigo-600'; }
            if (wp.category === 'FOUNTAIN') { icon = '💧'; color = 'bg-sky-400'; }

            const marker = new naver.maps.Marker({
                position: new naver.maps.LatLng(wp.latitude, wp.longitude), map: map,
                icon: {
                    content: `<div class="w-10 h-10 ${color} border-2 border-white rounded-full shadow-xl flex items-center justify-center text-lg transform hover:scale-125 transition-transform cursor-pointer">${icon}</div>`,
                    anchor: new naver.maps.Point(20, 20)
                }
            });
            naver.maps.Event.addListener(marker, 'click', () => {
                infoWindow.setContent(`<div class="poi-info-window"><p class="poi-info-title">${wp.name}</p></div>`);
                infoWindow.open(map, marker);
            });
            poiMarkers.push(marker);
        });
    }

    /**
     * [이슈 해결] 레이아웃 변경 시 지도 리사이즈 강제 호출
     */
    function toggleResultMode(isResult) {
        document.getElementById('input-panel').style.display = isResult ? 'none' : 'flex';
        document.getElementById('result-overlay').classList.toggle('hidden', !isResult);

        // 레이아웃 엔진이 너비 변화를 인지할 시간을 준 뒤 autoResize 호출
        setTimeout(() => {
            if(map) {
                map.autoResize();
                map.panBy(new naver.maps.Point(0, 0)); // 강제 리렌더링 유도
            }
        }, 100);
    }

    function backToSettings() { toggleResultMode(false); }

    function enterStrollMode() {
        document.getElementById('result-overlay').classList.add('hidden');
        document.getElementById('nav-top-banner').style.display = 'block';
        const route = recommendedRoutes[activeRouteIdx];
        if(route.navigationGuides && route.navigationGuides.length > 0) {
            document.getElementById('nav-text').innerText = route.navigationGuides[0].description.split('이동')[0];
        }
        setTimeout(() => { if(map) map.autoResize(); }, 100);
    }

    function clearPoiMarkers() { poiMarkers.forEach(m => m.setMap(null)); poiMarkers = []; if(infoWindow) infoWindow.close(); }
</script>
</body>
</html>
