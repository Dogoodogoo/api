spring:
  application:
    name: api

  profiles:
    include: secret

  docker:
    compose:
      enabled: false

  # JPA 및 Hibernate 공통 설정 (보안 정보 제외)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        highlight_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.hibernate.sql: info
    org.hibernate.orm.results: info
    com.github.dogoodogoo.api: debug