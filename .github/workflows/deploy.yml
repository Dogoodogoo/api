name: DogooDogoo API CI/CD (Docker)

on:
  push:
    branches: [ "develop" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # [최적화] JDK 설치 단계를 제거했습니다. (도커 내부 빌드이므로 가상 환경 JDK 불필요)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/dogoodogoo:latest
          # GHA 캐시를 통해 라이브러리 다운로드 단계는 거의 0초로 단축됩니다.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote Deployment via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 2025
          script: |
            # 1. 최신 이미지 가져오기 (가장 시간이 많이 걸리는 구간)
            docker pull ${{ secrets.DOCKER_USERNAME }}/dogoodogoo:latest
            
            # 2. 포트 점유 해제 및 컨테이너 갱신
            sudo fuser -k 8080/tcp || true
            docker rm -f dogoo-api || true
            
            # 3. 새 컨테이너 실행
            docker run -d --name dogoo-api \
              -p 8080:8080 \
              -v ~/app/dogoodogoo/application-secret.yml:/app/config/application-secret.yml \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/dogoodogoo:latest
            
            # 4. 사용하지 않는 이미지 자동 삭제 (서버 용량 관리)
            docker image prune -f