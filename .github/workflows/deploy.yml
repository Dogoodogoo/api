name: DogooDogoo API CI/CD (Docker)

# develop 브랜치에 코드가 push 될 때 파이프라인이 작동합니다.
on:
  push:
    branches: [ "develop" ]

jobs:
  # 1. 이미지 빌드 및 푸시 작업 (여기에 적힌 이름이 Job ID입니다)
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Docker Buildx 설치 (캐싱 기능을 위해 필수)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # [핵심] 도커 이미지 빌드 및 푸시 (GHA 캐시 적용)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/dogoodogoo:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 2. 서버 원격 배포 작업
  deploy:
    # [중요] 위의 Job ID와 완벽하게 일치해야 합니다.
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote Deployment via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 2025
          script: |
            # 1. 최신 이미지 가져오기
            docker pull ${{ secrets.DOCKER_USERNAME }}/dogoodogoo:latest
            
            # 2. 기존 컨테이너 중지 및 제거
            docker stop dogoo-api || true
            docker rm dogoo-api || true
            
            # 3. 새 컨테이너 실행
            docker run -d --name dogoo-api \
              -p 8080:8080 \
              -v ~/app/dogoodogoo/application-secret.yml:/app/config/application-secret.yml \
              ${{ secrets.DOCKER_USERNAME }}/dogoodogoo:latest
            
            # 4. 이미지 정리
            docker image prune -f